name: AutoSkip CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  autoskip-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 2

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas scikit-learn

    - name: Run AutoSkip Analysis
      run: |
        python src/autoskip_action.py

    - name: Run Pipeline
      run: |
        echo "✅ Pipeline Running..."
        echo "Build Success!"